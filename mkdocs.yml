site_name: 클라우드 보안 아키텍처 문서화
theme:
  name: material
  language: ko
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo 
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs 
    - navigation.sections 
    - toc.follow  

nav:
  - Home: index.md
  - 침해사고 분석:
      - "Drizly": 01-incident/case-01-drizly.md
      - "Capital One": 01-incident/case-02-capitalone.md
  - 인프라 분석:
      - "UNiDAYS": 02-infra/analysis-01-unidays.md
      - "보안 아키텍처 분석 2": 02-infra/analysis-02.md
  - 아키텍처 설계:
      - "바이브 코딩 아키텍처 설계": 03-architecture/01-hobby.md
      - "소규모 아키텍처 설계": 03-architecture/02-startup.md
      - "중소규모 아키텍처 설계": 03-architecture/03-growth.md
      - "중규모 아키텍처 설계": 03-architecture/04-enterprise.md
      - "대규모 아키텍처 설계": 03-architecture/05-hyperscale.md